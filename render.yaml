services:
  - type: web
    name: rueda-jump-api
    env: node
    plan: free
    rootDir: rueda-jump-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_NETLIFY_PREVIEWS
        value: "true"
